<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSFI Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f6f8fa; }
        .card { border: 0; box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.06); }
        .risk-Overdrawing { color: #b42318; font-weight: 700; }
        .risk-Caution { color: #b54708; font-weight: 700; }
        .risk-Safe { color: #027a48; font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">MSFI Monitor</a>
        <div class="d-flex align-items-center gap-3">
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('add_snapshot', portfolio_id=nav_selected_portfolio_id) }}">Add Snapshot</a>
                <a class="nav-link" href="{{ url_for('history', portfolio_id=nav_selected_portfolio_id) }}">History</a>
                <a class="nav-link" href="{{ url_for('portfolios') }}">Portfolios</a>
            </div>
            <div class="text-light d-flex align-items-center gap-2">
                <label for="portfolioSelector" class="small m-0">Portfolio</label>
                <select id="portfolioSelector" class="form-select form-select-sm">
                    <option value="">All</option>
                    {% for portfolio in nav_portfolios %}
                    <option value="{{ portfolio['id'] }}" {% if nav_selected_portfolio_id == portfolio['id'] %}selected{% endif %}>
                        {{ portfolio["name"] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
</nav>
<main class="container pb-5">
    {% block content %}{% endblock %}
</main>
<script>
const portfolioSelector = document.getElementById("portfolioSelector");
if (portfolioSelector) {
    portfolioSelector.addEventListener("change", function () {
        const selected = this.value;
        if (!selected) {
            window.location.href = "{{ url_for('dashboard') }}";
            return;
        }
        window.location.href = "{{ url_for('dashboard') }}?focus_portfolio_id=" + encodeURIComponent(selected) + "&portfolio_id=" + encodeURIComponent(selected) + "#portfolio-" + encodeURIComponent(selected);
    });
}
</script>
</body>
</html>
