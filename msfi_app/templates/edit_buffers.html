{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-lg-6">
        <h1 class="h3 mb-1">Edit Portfolio Buffers</h1>
        <p class="text-muted mb-3">
            Portfolio: <strong>{{ portfolio["name"] }}</strong><br>
            Changes here affect future snapshots only.
        </p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" class="card p-4">
            <div class="mb-3">
                <label class="form-label">Buffer 1 (%)</label>
                <input type="number" step="0.01" name="buffer_1_percent" class="form-control" value="{{ form_data.get('buffer_1_percent', '') }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Buffer 2 (%)</label>
                <input type="number" step="0.01" name="buffer_2_percent" class="form-control" value="{{ form_data.get('buffer_2_percent', '') }}" required>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save Buffers</button>
                <a href="{{ url_for('dashboard', focus_portfolio_id=portfolio['id'], portfolio_id=portfolio['id']) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
