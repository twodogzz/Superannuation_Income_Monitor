{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-lg-8">
        <h1 class="h3 mb-1">{{ form_title }}</h1>
        <p class="text-muted mb-3">
            Portfolio: <strong>{{ portfolio["name"] }}</strong>
            | Future buffer defaults:
            {{ (portfolio["buffer_1_percent"] * 100)|round(2) }}% and
            {{ (portfolio["buffer_2_percent"] * 100)|round(2) }}%
        </p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" class="card p-4">
            <input type="hidden" name="portfolio_id" value="{{ portfolio['id'] }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Snapshot Date</label>
                    <input type="date" name="snapshot_date" class="form-control" value="{{ form_data.get('snapshot_date', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Total Portfolio Value ($)</label>
                    <input type="number" step="0.01" name="total_value" class="form-control" value="{{ form_data.get('total_value', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Weighted Return (%)</label>
                    <input type="number" step="0.01" name="weighted_return_percent" class="form-control" value="{{ form_data.get('weighted_return_percent', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Actual Fortnightly Income ($)</label>
                    <input type="number" step="0.01" name="actual_income" class="form-control" value="{{ form_data.get('actual_income', '') }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Notes (optional)</label>
                    <textarea name="notes" rows="3" class="form-control">{{ form_data.get('notes', '') }}</textarea>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary" type="submit">{{ submit_label }}</button>
                <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
